name: Send Capsules Daily

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily
  workflow_dispatch:  # allows manual trigger

jobs:
  send-capsules:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger send capsules
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://www.mytimecapsule.app/api/send-capsules